name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Ensures CI workflow has minimal permissions for security
permissions:
  contents: read # Read-only access to repo contents for safer workflows
  pull-requests: write # Allow workflow to comment on, label, and update pull request as part of automation
  id-token: write # Allow OIDC tokens for secure cloud authentication

jobs:
  lint:
    if: github.event.pull_request.state == 'open' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: '22.13.1'
          cache: 'npm'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install Python dependencies
        run: pipenv install --dev --deploy

      - name: Install Node dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Check code formatting
        run: npm run fmt:check

  sonarqube:
    if: github.event.pull_request.state == 'open' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Get github-ci version
        id: ci_version
        run: |
          # Extract version from cd.yml workflow
          workflow_yaml=$(cat .github/workflows/cd.yml)
          uses_data=$(echo "$workflow_yaml" | grep 'jalantechnologies/github-ci')
          tag=$(echo $uses_data | sed -n 's/.*@\(.*\)/\1/p')
          echo "version=$(echo $tag)" >> $GITHUB_OUTPUT

      - name: Checkout github-ci
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: jalantechnologies/github-ci
          path: platform
          ref: ${{ steps.ci_version.outputs.version }}

      - name: Run SonarQube analysis
        uses: ./platform/.github/actions/analyze
        with:
          sonar_host_url: ${{ vars.SONAR_HOST_URL }}
          sonar_token: ${{ secrets.SONAR_TOKEN }}
          branch: ${{ github.head_ref }}
          branch_base: main
          pull_request_number: ${{ github.event.number }}

  scan:
    if: github.event.pull_request.state == 'open' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Cache Trivy DB
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: .trivy
          key: trivy-db-v1

      - name: Extract branch name
        id: extract_branch
        run: |
          BRANCH_NAME=$(echo ${{ github.event.pull_request.head.ref }} | sed -e 's/^refs\/heads\///g')
          BRANCH_HASH=$(sha1sum < <(printf '%s' $BRANCH_NAME) | cut -c -15)
          echo "branch_hash=$(echo $BRANCH_HASH)" >> $GITHUB_OUTPUT

      - name: Get changes
        id: changes
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }} HEAD)
          for file in $CHANGED_FILES; do
            if [[ -f "$file" ]]; then
              mkdir -p "changed_files/$(dirname "$file")"
                cp "$file" "changed_files/$file"
              fi
          done
          echo $CHANGED_FILES
          ls changed_files/
          echo "changed_files=$(echo $CHANGED_FILES)" >> $GITHUB_OUTPUT

      - name: Run Trivy scan on changed files
        id: trivy
        if: steps.changes.outputs.changed_files != ''
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        continue-on-error: true
        with:
          version: 'v0.69.2'
          args: '--skip-db-update --skip-java-db-update'
          scan-type: 'filesystem'
          scan-ref: './changed_files'
          format: 'template'
          template: '@markdown-templates/fs-markdown.tpl'
          output: 'trivy-report.md'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          exit-code: 1
          cache-dir: .trivy

      - name: Comment PR with audit results
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        if: steps.trivy.outcome == 'failure'
        with:
          token: ${{ secrets.TRIVY_SCAN_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: trivy-report.md

      - name: Get changes in k8s folder and subfolders
        id: iac_changes
        run: |
          # Fetch base branch
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1

          # Get all changed files
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }} HEAD)

          # Initialize filtered variable
          FILTERED_FILES=""
          mkdir -p iac_changed_files/
          # Loop and copy only files in k8s/ or subdirectories
          for file in $CHANGED_FILES; do
            if [[ -f "$file" && "$file" == lib/kube/* ]]; then
              mkdir -p "iac_changed_files/$(dirname "$file")"
              cp "$file" "iac_changed_files/$file"
              FILTERED_FILES="$FILTERED_FILES $file"
            fi
          done

          # Copy core network-policy.yaml for Checkov to detect NetworkPolicy
          # This fixes CKV2_K8S_6 false positives when only deployment files change
          if [ -n "$FILTERED_FILES" ] && [ -f "lib/kube/core/network-policy.yaml" ]; then
            mkdir -p "iac_changed_files/lib/kube/core/"
            cp "lib/kube/core/network-policy.yaml" "iac_changed_files/lib/kube/core/"
          fi

          echo "FILTERED_FILES=$FILTERED_FILES" >> $GITHUB_OUTPUT

      - name: Run Trivy scan on IaC
        if: ${{ steps.iac_changes.outputs.FILTERED_FILES != '' }}
        id: trivy_iac
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        continue-on-error: true
        with:
          version: 'v0.69.2'
          args: '--skip-db-update --skip-java-db-update'
          scan-type: 'config'
          scan-ref: 'iac_changed_files'
          format: 'template'
          template: '@markdown-templates/iac-markdown.tpl'
          output: 'trivy-iac-report.md'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          exit-code: 1
          cache-dir: .trivy

      - name: Comment PR with audit results
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        if: ${{ steps.iac_changes.outputs.FILTERED_FILES != '' && steps.trivy_iac.outcome == 'failure' }}
        with:
          token: ${{ secrets.TRIVY_SCAN_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: trivy-iac-report.md

      - name: Run Checkov action
        id: checkov
        if: ${{ steps.iac_changes.outputs.FILTERED_FILES != '' }}
        uses: bridgecrewio/checkov-action@f34885219720066007f948b843e747bb136aa223
        continue-on-error: true
        with:
          directory: iac_changed_files/
          output_format: 'github_failed_only'
          output_file_path: checkov_result
          quiet: 'true'

      - name: Comment PR with audit results
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        if: ${{ steps.checkov.outcome == 'failure' }}
        with:
          token: ${{ secrets.TRIVY_SCAN_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: checkov_result/results_github_failed_only.md

      - name: Build Docker image for scanning
        run: |
          docker build -t flask-react-app:${{ steps.extract_branch.outputs.branch_hash }} .

      - name: Run Trivy scan on docker images
        id: trivy_docker
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        continue-on-error: true
        with:
          version: 'v0.69.2'
          args: '--skip-db-update --skip-java-db-update'
          scan-type: 'image'
          image-ref: 'flask-react-app:${{ steps.extract_branch.outputs.branch_hash }}'
          format: 'template'
          template: '@markdown-templates/docker-markdown.tpl'
          output: 'trivy-docker-report.md'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          exit-code: 1
          cache-dir: .trivy

      - name: Check if report contains any real vulnerabilities
        id: vuln_check
        run: |
          # Count how many vulnerabilities are listed in the markdown
          COUNT=$(grep -c "CVE-" trivy-docker-report.md || true)
          echo "vuln_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Comment PR with audit results
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9
        if: steps.trivy_docker.outcome == 'failure' && hashFiles('trivy-docker-report.md') != '' && steps.vuln_check.outputs.vuln_count != '0'
        with:
          token: ${{ secrets.TRIVY_SCAN_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: trivy-docker-report.md

      - name: Fail job if Trivy found issues
        if: steps.trivy.outcome == 'failure' || steps.trivy_docker.outcome == 'failure' || steps.checkov.outcome == 'failure'
        run: |
          echo "❌ Trivy found vulnerabilities — failing the job."
          exit 1

  test:
    if: github.event.pull_request.state == 'open' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Prepare coverage directory
        run: mkdir -p output

      - name: Run integration tests
        run: docker compose -f docker-compose.test.yml up --exit-code-from app

      - name: Copy coverage artifacts from container
        if: always()
        run: |
          if docker compose -f docker-compose.test.yml ps -q app >/dev/null 2>&1; then
            docker compose -f docker-compose.test.yml cp app:/app/output/coverage.xml output/coverage.xml || echo "coverage.xml not found in app container"
          fi

      - name: Validate coverage excludes test files
        run: |
          if [ -f output/coverage.xml ]; then
            if grep -qE 'filename="[^"]*/(tests/|test_[^"]*\.py|[^"]*_test\.py)' output/coverage.xml; then
              echo "ERROR: Coverage report includes test files. Check .coveragerc configuration."
              echo "Files found:"
              grep -oE 'filename="[^"]*/(tests/|test_[^"]*\.py|[^"]*_test\.py)[^"]*"' output/coverage.xml | head -20
              exit 1
            fi
            echo "Coverage validation passed: no test files in coverage report"
          fi

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v || true

      - name: Coverage report
        continue-on-error: true
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95
        with:
          filename: output/coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'

      - name: Add coverage PR comment
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          recreate: true
          path: code-coverage-results.md
